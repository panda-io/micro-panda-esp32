name: esp32
version: 0.1.0

# IDF component requirements — add these to your build system:
#   idf_component_register REQUIRES (CMakeLists.txt)
#   or lib_deps (platformio.ini)
#
#   gpio, pwm, adc : esp_driver_gpio  esp_driver_ledc  esp_adc
#   i2c            : esp_driver_i2c
#   spi            : esp_driver_spi

targets:
  esp32:
    entry: main
    src: src/
    type: c
    out: main/esp32.c
    config: esp32.yaml
    flags: [ESP32, MCU32]
    gen:
      entry: app_main
